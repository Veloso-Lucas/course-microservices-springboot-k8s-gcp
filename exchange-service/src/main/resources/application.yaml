server:
  port: 8000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    # Register using the machine IP instead of the OS hostname (e.g. DESKTOP-xxx.mshome.net),
    # so Eureka clients (API Gateway, Feign) can resolve and reach this instance locally.
    prefer-ip-address: true

spring:
  application:
    name: exchange-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/exchange_service
    username: root
    password: Gue6TSh6GjI&Ek
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false

springdoc:
  api-docs:
    path: /exchange-service/v3/api-docs
  swagger-ui:
    url: /exchange-service/v3/api-docs
  # Relative server URL so "Try it out" uses the host where Swagger UI is open (API Gateway).
  open-api:
    servers:
      - url: /
        description: API Gateway